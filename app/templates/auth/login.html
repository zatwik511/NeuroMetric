{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5 col-lg-4">
    <div class="card p-4">
      <div class="text-center mb-4">
        <i class="bi bi-mortarboard-fill fs-1 text-dark"></i>
        <h4 class="mt-2 fw-bold">Welcome back</h4>
        <p class="text-muted small">Sign in to your exam portal account</p>
      </div>

      <form method="POST" action="{{ url_for('auth.login') }}">
        <div class="mb-3">
          <label class="form-label fw-semibold">Email address</label>
          <input type="email" name="email" class="form-control" placeholder="you@example.com" required autofocus>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Password</label>
          <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-dark w-100">
          <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
        </button>
      </form>

      <hr class="my-3">
      <p class="text-center text-muted small mb-0">
        Don't have an account?
        <a href="{{ url_for('auth.register') }}" class="text-decoration-none fw-semibold">Register here</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
