{% extends "base.html" %}
{% block title %}Create Exam{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">

    <nav aria-label="breadcrumb" class="mb-3">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{{ url_for('teacher.exams') }}">My Exams</a></li>
        <li class="breadcrumb-item active">New Exam</li>
      </ol>
    </nav>

    <div class="card p-4">
      <h4 class="fw-bold mb-1"><i class="bi bi-journal-plus me-2"></i>Create New Exam</h4>
      <p class="text-muted small mb-4">Fill in the details below. You can add questions on the next screen.</p>

      <form method="POST" action="{{ url_for('teacher.create_exam') }}">
        <div class="mb-3">
          <label class="form-label fw-semibold">Exam Title</label>
          <input type="text" name="title" class="form-control"
                 placeholder="e.g. Mid-Term Computer Science Exam" required autofocus>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Subject</label>
          <input type="text" name="subject" class="form-control"
                 placeholder="e.g. Computer Science" required>
        </div>

        <div class="mb-4">
          <label class="form-label fw-semibold">Time Limit</label>
          <div class="input-group" style="max-width: 200px;">
            <input type="number" name="time_limit" class="form-control"
                   value="60" min="1" max="480" required>
            <span class="input-group-text">minutes</span>
          </div>
          <div class="form-text">Students will be auto-submitted when the timer runs out.</div>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-dark">
            <i class="bi bi-arrow-right-circle me-1"></i>Create & Add Questions
          </button>
          <a href="{{ url_for('teacher.exams') }}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
