{% extends "base.html" %}
{% block title %}Access Denied{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-6 text-center">
    <div class="card p-5">
      <div class="mb-4">
        <div class="rounded-circle bg-danger bg-opacity-10 d-inline-flex align-items-center
                    justify-content-center mb-3" style="width:80px;height:80px;">
          <i class="bi bi-shield-lock text-danger" style="font-size:2rem;"></i>
        </div>
        <h1 class="display-4 fw-bold text-muted">403</h1>
        <h4 class="fw-bold mb-2">Access Denied</h4>
        <p class="text-muted">You don't have permission to view this page.</p>
      </div>
      <a href="{{ url_for('index') }}" class="btn btn-dark">
        <i class="bi bi-house me-1"></i>Go Home
      </a>
    </div>
  </div>
</div>
{% endblock %}
