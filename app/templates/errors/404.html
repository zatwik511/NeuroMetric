{% extends "base.html" %}
{% block title %}Page Not Found{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-6 text-center">
    <div class="card p-5">
      <div class="mb-4">
        <div class="rounded-circle bg-secondary bg-opacity-10 d-inline-flex align-items-center
                    justify-content-center mb-3" style="width:80px;height:80px;">
          <i class="bi bi-search text-secondary" style="font-size:2rem;"></i>
        </div>
        <h1 class="display-4 fw-bold text-muted">404</h1>
        <h4 class="fw-bold mb-2">Page Not Found</h4>
        <p class="text-muted">The page you're looking for doesn't exist or has been moved.</p>
      </div>
      <a href="{{ url_for('index') }}" class="btn btn-dark">
        <i class="bi bi-house me-1"></i>Go Home
      </a>
    </div>
  </div>
</div>
{% endblock %}
